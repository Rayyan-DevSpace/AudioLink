workflows:
  audiolink-android:
    name: AudioLink Android Build
    max_build_duration: 60
    instance_type: linux_x86_64
    environment:
      vars:
        PACKAGE_NAME: "com.rayyanshehzad.audiolink"
      # Uncomment once you've uploaded a release keystore under
      # Team settings > codemagic.yaml settings > Code signing identities > Android keystores,
      # and give it this same reference name.
      # android_signing:
      #   - audiolink_keystore
      # Uncomment once you've created a Google Play service account and added its
      # JSON credentials as a secret variable in a group called "google_play"
      # (see docs.codemagic.io/yaml-publishing/google-play for the setup steps).
      # groups:
      #   - google_play
    scripts:
      - name: Set Android SDK location
        script: |
          echo "sdk.dir=$ANDROID_SDK_ROOT" > "$CM_BUILD_DIR/local.properties"

      # Debug build — works immediately with no signing setup, good for verifying
      # the project builds cleanly and for internal testing.
      - name: Build Android debug APK
        script: |
          ./gradlew assembleDebug

      # Release build — needs android_signing configured above (keystore uploaded
      # in the Codemagic UI). Uncomment when ready.
      # - name: Build Android release
      #   script: |
      #     LATEST_GOOGLE_PLAY_BUILD_NUMBER=$(google-play get-latest-build-number --package-name "$PACKAGE_NAME" || echo "")
      #     if [ -z "$LATEST_GOOGLE_PLAY_BUILD_NUMBER" ]; then
      #       UPDATED_BUILD_NUMBER=$BUILD_NUMBER
      #     else
      #       UPDATED_BUILD_NUMBER=$(($LATEST_GOOGLE_PLAY_BUILD_NUMBER + 1))
      #     fi
      #     ./gradlew bundleRelease \
      #       -PversionCode=$UPDATED_BUILD_NUMBER \
      #       -PversionName=1.0.$UPDATED_BUILD_NUMBER

    artifacts:
      - app/build/outputs/**/*.apk
      - app/build/outputs/**/*.aab
      - app/build/outputs/**/mapping.txt

    publishing:
      email:
        recipients:
          - your_email@example.com
        notify:
          success: true
          failure: true

      # Uncomment once android_signing and the google_play group above are set up,
      # and switch the build step to bundleRelease.
      # google_play:
      #   credentials: $GOOGLE_PLAY_SERVICE_ACCOUNT_CREDENTIALS
      #   track: internal
      #   submit_as_draft: true
